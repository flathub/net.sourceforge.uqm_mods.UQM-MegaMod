id: net.sourceforge.uqm_mods.UQM-MegaMod
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
command: UrQuanMasters
finish-args:
  - --socket=x11
  - --share=ipc
  - --device=all
  - --socket=pulseaudio
  - --share=network
  - --persist=.uqm-megamod
modules:
  - name: UQM-MegaMod
    buildsystem: simple
    build-commands:
      - echo >config.state CHOICE_debug_VALUE='nodebug'
      - echo >>config.state INPUT_install_prefix_VALUE='/app'
      - echo >>config.state INPUT_install_bindir_VALUE='/app/bin'
      - ./build.sh uqm -j
      - ./build.sh uqm install
      - install -D mm-0.8.4-content.uqm /app/share/uqm-megamod/content/packages/mm-0.8.4-content.uqm
      - install -D mm-0.8.4-3dovoice.uqm /app/share/uqm-megamod/content/addons/mm-0.8.4-3dovoice.uqm
      - install -D mm-0.8.4-hd-content.uqm /app/share/uqm-megamod/content/addons/mm-0.8.4-hd-content.uqm
      - install -D uqm-0.8.0-3DOMusicRemastered.uqm /app/share/uqm-megamod/content/addons/uqm-0.8.0-3DOMusicRemastered.uqm
      - install -D uqm-0.8.0-3dovideo.uqm /app/share/uqm-megamod/content/addons/uqm-0.8.0-3dovideo.uqm
      - install -D mm-0.8.4-dosmode.uqm /app/share/uqm-megamod/content/addons/mm-0.8.4-dosmode.uqm
      - install -D mm-0.8.4-3domode.uqm /app/share/uqm-megamod/content/addons/mm-0.8.4-3domode.uqm
      - install -D mm-0.8.4-volasaurus-remix-pack.uqm /app/share/uqm-megamod/content/addons/mm-0.8.4-volasaurus-remix-pack.uqm
      - install -D gamecontrollerdb.txt /app/share/uqm-megamod/content/gamecontrollerdb.txt
      - install -D src/res/megamod.png /app/share/icons/hicolor/256x256/apps/$FLATPAK_ID.png
      - install -D src/res/megamod.desktop /app/share/applications/$FLATPAK_ID.desktop
      - install -D $FLATPAK_ID.appdata.xml /app/share/appdata/$FLATPAK_ID.appdata.xml
